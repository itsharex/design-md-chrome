<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DESIGN.md style extractor by TypeUI</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="brand">
          <img src="../assets/icons/icon32.png" width="24" height="24" alt="App logo" />
          <div>
            <h1>DESIGN.md extractor by TypeUI</h1>
            <p>Auto-generates from the active tab</p>
          </div>
        </div>
        <span class="badge">v0.1</span>
      </header>

      <section class="mode-switch" aria-label="Output mode">
        <button id="designModeBtn" type="button" data-mode="design" class="mode-btn is-active">
          DESIGN.md
        </button>
        <button id="skillModeBtn" type="button" data-mode="skill" class="mode-btn">
          SKILL.md
        </button>
      </section>

      <section class="actions">
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="downloadBtn" type="button" disabled>Download</button>
        <button id="copyBtn" type="button" disabled>Copy</button>
      </section>

      <p id="status" class="status">Preparing automatic extraction...</p>
      <ul id="issues" class="issues"></ul>

      <section class="preview-wrap">
        <label for="preview">Generated Markdown</label>
        <textarea id="preview" readonly></textarea>
      </section>

      <footer class="footnote">
        Based on
        <a href="https://typeui.sh/" target="_blank" rel="noopener noreferrer">TypeUI</a>
      </footer>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
